<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dce3ea"/>
      <stop offset="38%" stop-color="#9ea9b5"/>
      <stop offset="100%" stop-color="#5b6673"/>
    </linearGradient>
    <linearGradient id="darkVignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </linearGradient>
    <filter id="blurSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="800" height="1000" fill="url(#steel)"/>

  <g opacity="0.22">
    <rect x="0" y="0" width="800" height="1000" fill="none" stroke="#ffffff" stroke-width="1"/>
    <g stroke="#f5f7fa" stroke-width="1">
      <path d="M0 125h800M0 250h800M0 375h800M0 500h800M0 625h800M0 750h800M0 875h800"/>
      <path d="M100 0v1000M200 0v1000M300 0v1000M400 0v1000M500 0v1000M600 0v1000M700 0v1000"/>
    </g>
  </g>

  <g filter="url(#blurSoft)" opacity="0.3">
    <ellipse cx="130" cy="150" rx="120" ry="42" fill="#ffffff"/>
    <ellipse cx="640" cy="240" rx="140" ry="50" fill="#ffffff"/>
    <ellipse cx="420" cy="760" rx="180" ry="58" fill="#9aa8b6"/>
  </g>

  <rect width="800" height="1000" fill="url(#darkVignette)"/>
</svg>
