<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Sushi placeholder">
  <defs>
    <linearGradient id="plate" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a" />
      <stop offset="1" stop-color="#0f0f0f" />
    </linearGradient>
    <linearGradient id="rice" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f4ef" />
      <stop offset="1" stop-color="#e6e0d6" />
    </linearGradient>
    <linearGradient id="fish" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff6b6b" />
      <stop offset="1" stop-color="#d62828" />
    </linearGradient>
    <linearGradient id="seaweed" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1f3b2c" />
      <stop offset="1" stop-color="#0b1f16" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#0a0a0a" />
  <circle cx="400" cy="380" r="230" fill="url(#plate)" stroke="#1f1f1f" stroke-width="6" />
  <circle cx="400" cy="380" r="190" fill="none" stroke="#232323" stroke-width="2" />

  <g transform="translate(180 220)">
    <rect x="0" y="40" width="180" height="120" rx="26" fill="url(#rice)" />
    <rect x="-2" y="85" width="184" height="55" rx="16" fill="url(#seaweed)" />
    <rect x="10" y="18" width="160" height="70" rx="22" fill="url(#fish)" />
    <circle cx="32" cy="68" r="10" fill="#ffd5d5" opacity="0.8" />
  </g>

  <g transform="translate(420 200)">
    <rect x="0" y="40" width="200" height="130" rx="28" fill="url(#rice)" />
    <rect x="-2" y="92" width="204" height="58" rx="16" fill="url(#seaweed)" />
    <rect x="12" y="10" width="176" height="80" rx="26" fill="#ffa94d" />
    <circle cx="160" cy="70" r="12" fill="#ffe6c1" opacity="0.8" />
  </g>

  <g transform="translate(270 350)">
    <rect x="0" y="35" width="260" height="145" rx="32" fill="url(#rice)" />
    <rect x="-2" y="100" width="264" height="62" rx="18" fill="url(#seaweed)" />
    <rect x="16" y="0" width="228" height="95" rx="30" fill="#ff8fab" />
    <circle cx="60" cy="68" r="14" fill="#ffd6e5" opacity="0.8" />
  </g>

  <text x="400" y="540" text-anchor="middle" fill="#8f8f8f" font-family="Arial, sans-serif" font-size="22" letter-spacing="1">
    Imagen no disponible
  </text>
</svg>
